name: Deploy theme to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Evita despliegues solapados si haces varios push seguidos
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy theme (rsync sobre SSH, sudo remoto)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='DEPLOY.md' \
            --rsync-path="sudo rsync" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_THEME_PATH }}/"

      - name: Fix ownership
        run: |
          # uid 33 = www-data dentro y fuera del contenedor.
          # El theme se monta (bind-mount) en el contenedor wp_purezza, así que el
          # rsync queda activo al instante. OPcache revalida solo en segundos; si
          # alguna vez hace falta forzar, en el VPS: sudo docker restart wp_purezza
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo chown -R 33:33 '${{ secrets.VPS_THEME_PATH }}'"
